<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Configuratore Macchina</title>

<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --primary:#2563eb;
  --primary-hover:#1d4ed8;
  --text:#1e293b;
  --muted:#64748b;
  --border:#e2e8f0;
  --radius:14px;
  --shadow:0 8px 24px rgba(0,0,0,0.08);
}

*{
  box-sizing:border-box;
}

body{
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg,#eef2ff,#f8fafc);
  color: var(--text);
  padding: 30px;
  margin:0;
}

input{
    width:100%;
    padding:14px 16px;
    margin-bottom:14px;
    font-size:1rem;
    border:1px solid #dbe2ea;
    border-radius:12px;
    background:#ffffff;
    transition:0.2s ease;
}

input:focus{
    outline:none;
    border-color:#111827;
    box-shadow:0 0 0 4px rgba(17,24,39,0.10);
}

.container{
  max-width: 900px;
  margin:auto;
  background: var(--card);
  padding: 30px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

h1,h2{
  margin-top:0;
  font-weight:700;
  text-align:center;
}

h2{
  margin-top:25px;
  font-size:1.3rem;
  border-bottom:1px solid var(--border);
  padding-bottom:8px;
}

label{
  display:block;
  font-size:0.95rem;
  margin-bottom:6px;
  color:var(--muted);
}

select{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;

  width:100%;
  padding:14px 46px 14px 16px;
  margin-bottom:14px;

  font-size:1rem;
  font-weight:500;
  color:#1e293b;

  border:1px solid #dbe2ea;
  border-radius:12px;

  background:
    linear-gradient(180deg,#ffffff,#f8fafc) padding-box,
    linear-gradient(135deg,#cbd5e1,#e2e8f0) border-box;

  background-origin:border-box;
  background-clip:padding-box,border-box;

  cursor:pointer;
  transition:all 0.22s ease;

  /* freccia custom SVG */
  background-image:
  url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' fill='none' stroke='%2364758b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 8 10 12 14 8'/></svg>");

  background-repeat:no-repeat;
  background-position:right 14px center;
  background-size:18px;
}

/* hover */
select:hover{
  border-color:#94a3b8;
  transform:translateY(-1px);
  box-shadow:0 6px 16px rgba(0,0,0,0.06);
}

/* focus */
select:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,0.12);
}

/* option menu */
select option{
  background:#ffffff;
  color:#1e293b;
  padding:10px;
}

/* disabilitato */
select:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

/* wrapper opzionale per label + select */
.select-group{
  margin-bottom:18px;
}

.select-group label{
  display:block;
  margin-bottom:7px;
  font-size:0.92rem;
  font-weight:600;
  color:#475569;
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  transition:0.2s ease;
}

button:hover{
  background:var(--primary-hover);
  transform:translateY(-1px);
}

button:active{
  transform:translateY(0);
}

.categoria{
  background:#f8fafc;
  border:1px solid var(--border);
  padding:18px;
  border-radius:12px;
  margin-bottom:18px;
}

.riga{
  padding:10px 12px;
  background:white;
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:8px;
}

hr{
  border:none;
  border-top:1px solid var(--border);
  margin:25px 0;
}

@media (max-width:600px){
  body{
    padding:15px;
  }

  .container{
    padding:18px;
  }
}

#totale{
    list-style:none;
    padding:0;
    margin:0;
}

#totale li{
    display:grid;
    grid-template-columns:70px 40px 1fr;
    gap:10px;
    align-items:center;

    padding:10px 14px;
    margin-bottom:8px;

    background:#ffffff;
    border:1px solid #e2e8f0;
    border-radius:10px;

    font-family:Consolas, monospace;
    font-size:15px;
}

#totale li .qty{
    text-align:right;
    font-weight:700;
}

#totale li .sep{
    text-align:center;
    color:#64748b;
}

#totale li .name{
    text-align:left;
}

.categoria ul{
    list-style:none;
    padding:0;
    margin-top:12px;
}

.categoria ul li{
    display:grid;
    grid-template-columns:70px 40px 1fr;
    gap:10px;
    align-items:center;

    padding:10px 14px;
    margin-bottom:8px;

    background:#ffffff;
    border:1px solid #e2e8f0;
    border-radius:10px;

    font-family:Consolas, monospace;
    font-size:15px;
}

.categoria ul li .qty{
    text-align:right;
    font-weight:700;
}

.categoria ul li .sep{
    text-align:center;
    color:#64748b;
}

.categoria ul li .name{
    text-align:left;
}

.categoria strong{
    display:block;
    font-size:1rem;
    margin-bottom:6px;
    color:#111827;
}
</style>
</head>

// AGGIUNGI RIGA CAMPATA INTERMEDIA
function aggiungiCampata() {
    let div = document.createElement("div");
    div.className = "riga";

    div.innerHTML = `
        <select onchange="aggiorna()">
            <option value="">-- Seleziona --</option>
            <option value="campata44_m">44</option>
            <option value="campata50_m">50</option>
            <option value="campata56_m">56</option>
            <option value="campata62_m">62</option>
        </select>
        <button onclick="this.parentElement.remove(); aggiorna()">X</button>
    `;

    document.getElementById("listaCampate").appendChild(div);
}

// FUNZIONE PRINCIPALE
function aggiorna() {

    let totale = {};
    let perCategoria = {};

    function aggiungi(componenti, categoria) {

        if (!perCategoria[categoria]) perCategoria[categoria] = {};

        for (let pezzo in componenti) {

            if (!totale[pezzo]) totale[pezzo] = 0;
            totale[pezzo] += componenti[pezzo];

            if (!perCategoria[categoria][pezzo]) {
                perCategoria[categoria][pezzo] = 0;
            }
            perCategoria[categoria][pezzo] += componenti[pezzo];
        }
    }

    // SELECT NORMALI
    document.querySelectorAll("select[data-cat]").forEach(select => {
        let val = select.value;
        if (dati[val]) aggiungi(dati[val], select.dataset.cat);
    });

    // CAMPATA INIZIALE
    let iniziale = document.getElementById("campata_iniziale").value;
    if (dati[iniziale]) aggiungi(dati[iniziale], "Campate");

    // CAMPATE INTERMEDIE
    document.querySelectorAll("#listaCampate select").forEach(select => {
        let val = select.value;
        if (dati[val]) aggiungi(dati[val], "Campate");
    });

    // CAMPATA FINALE
    let finale = document.getElementById("campata_finale").value;
    if (dati[finale]) aggiungi(dati[finale], "Campate");

    // STAMPA PER CATEGORIA
    let divCat = document.getElementById("perCategoria");
    divCat.innerHTML = "";

    for (let cat in perCategoria) {

    let blocco = document.createElement("div");
    blocco.className = "categoria";

    let titolo = document.createElement("strong");
    titolo.textContent = cat;
    blocco.appendChild(titolo);

    let ul = document.createElement("ul");

    for (let pezzo in perCategoria[cat]) {

        let li = document.createElement("li");

        li.innerHTML = `
            <span class="qty">${perCategoria[cat][pezzo]}</span>
            <span class="sep">x</span>
            <span class="name">${pezzo}</span>
        `;

        ul.appendChild(li);
    }

    blocco.appendChild(ul);
    divCat.appendChild(blocco);
}

    // STAMPA TOTALE
    let ulTot = document.getElementById("totale");
    ulTot.innerHTML = "";

    for (let pezzo in totale) {

        let li = document.createElement("li");

        li.innerHTML = `
            <span class="qty">${totale[pezzo]}</span>
            <span class="sep">x</span>
            <span class="name">${pezzo}</span>
        `;

        ulTot.appendChild(li);
    }
}
</script>

<script>
function getBase64Image(img) {
    let canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    return canvas.toDataURL("image/png");
}

function disegnaHeader(doc, logo, cliente, data, pageNumber){

    // LOGO
    doc.addImage(logo, "PNG", 20, 10, 22, 22);

    // AZIENDA
    doc.setFont("helvetica","bold");
    doc.setFontSize(12);
    doc.text("AGRO+ SRL", 50, 15);

    doc.setFont("helvetica","normal");
    doc.setFontSize(9);
    doc.text("Via Sacco e Vanzetti 21", 50, 21);
    doc.text("42021 Bibbiano (RE)", 50, 26);
    doc.text("info@agropiu.com - 0522 875924", 50, 31);

    // CLIENTE + DATA
    doc.setFontSize(10);
    doc.text("Cliente: " + cliente, 20, 45);
    doc.text("Data: " + data, 120, 45);

    // PAGINA
    doc.text("Pagina " + pageNumber, 180, 45);
}

async function generaPDF(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let cliente = document.getElementById("cliente").value.trim();
    if (!cliente) {
        alert("Inserisci il nome del cliente prima di esportare il PDF");
        return;
    }

    let data = new Date().toLocaleDateString();

    let img = new Image();
    img.src = "logo.png";

    img.onload = function () {

        let logo = getBase64Image(img);

        creaPDF(doc, logo, cliente, data);
    };
}

function creaPDF(doc, logo, cliente, data){

    let righe = document.querySelectorAll("#totale li");

    let pageHeight = doc.internal.pageSize.height;

    let yStart = 65;
    let y = yStart;

    let pageNumber = 1;

    // HEADER PRIMA PAGINA
    disegnaHeader(doc, logo, cliente, data, pageNumber);

    righe.forEach(riga => {

        let qty  = riga.querySelector(".qty").innerText;
        let sep  = riga.querySelector(".sep").innerText;
        let nome = riga.querySelector(".name").innerText;

        if (y > pageHeight - 20) {
            doc.addPage();
            pageNumber++;
            y = yStart;

            disegnaHeader(doc, logo, cliente, data, pageNumber);
        }

        doc.text(qty, 20, y);
        doc.text(sep, 35, y);
        doc.text(nome, 45, y);

        y += 8;
    });

    doc.save("configurazione-pivot.pdf");
}

</script>

</body>
</html>
